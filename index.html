<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VoiceFun</title>
    <meta name="description" content="A 3 x 3 voice board for WAV reference clips and text playback.">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">9 voice slots</p>
        <h1>VoiceFun</h1>
      </div>
      <button class="icon-button" id="exportJson" type="button" title="Export voice board">
        <span aria-hidden="true">↓</span>
        <span class="sr-only">Export voice board</span>
      </button>
    </header>

    <main class="voice-board" id="voiceBoard" aria-live="polite"></main>

    <template id="voiceSlotTemplate">
      <article class="voice-slot">
        <div class="slot-topline">
          <span class="slot-number"></span>
          <span class="slot-status">Empty</span>
        </div>

        <label>
          Name
          <input class="voice-name" type="text" placeholder="Voice name" autocomplete="off">
        </label>

        <label>
          Text
          <textarea class="voice-text" rows="4" placeholder="Write text for this voice to play."></textarea>
        </label>

        <div class="slot-actions">
          <button class="primary-button play-button" type="button">Play text</button>
          <label class="upload-button">
            Upload WAV
            <input class="voice-file" type="file" accept=".wav,audio/wav,audio/x-wav">
          </label>
        </div>

        <audio class="reference-audio" controls preload="metadata"></audio>
        <p class="reference-meta">No reference clip yet.</p>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
