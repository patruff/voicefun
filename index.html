<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VoiceFun</title>
    <meta name="description" content="A 3 x 3 voice board for WAV reference clips and text playback.">
    <link rel="stylesheet" href="styles.css?v=voice-presets">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">9 voice slots</p>
        <h1>VoiceFun</h1>
      </div>
      <button class="icon-button" id="exportJson" type="button" title="Export voice board">
        <span aria-hidden="true">↓</span>
        <span class="sr-only">Export voice board</span>
      </button>
    </header>

    <main>
      <section class="story-panel" aria-labelledby="story-title">
        <div class="story-controls">
          <div>
            <p class="eyebrow">Story builder</p>
            <h2 id="story-title">Tell a story</h2>
          </div>

          <label>
            Must use phrases
            <textarea id="mustUsePhrases" rows="3" placeholder="one phrase per line"></textarea>
          </label>

          <label>
            LLM endpoint
            <input id="llmEndpoint" type="text" placeholder="/api/story">
          </label>

          <label>
            Voicebox URL
            <input id="voiceboxUrl" type="text" placeholder="http://127.0.0.1:17493">
          </label>

          <div class="story-actions">
            <button class="primary-button" id="tellStory" type="button">Create story</button>
            <button class="secondary-button" id="playStory" type="button">Play story</button>
            <button class="ghost-button" id="stopStory" type="button">Stop</button>
          </div>

          <div class="story-progress-wrap">
            <progress id="storyProgress" value="0" max="1"></progress>
            <span id="storyProgressText">Idle</span>
          </div>

          <audio id="storyAudio" controls preload="metadata"></audio>
        </div>

        <div class="transcript-wrap">
          <div class="transcript-heading">
            <h2>Transcript</h2>
            <span id="storyStatus">Ready</span>
          </div>
          <ol id="storyTranscript" class="story-transcript"></ol>
        </div>
      </section>

      <section class="voice-board" id="voiceBoard" aria-live="polite"></section>
    </main>

    <template id="voiceSlotTemplate">
      <article class="voice-slot">
        <div class="slot-topline">
          <span class="slot-number"></span>
          <span class="slot-status">Empty</span>
        </div>

        <label>
          Name
          <input class="voice-name" type="text" placeholder="Voice name" autocomplete="off">
        </label>

        <label>
          Preset
          <select class="voice-preset">
            <option value="">Custom voice</option>
          </select>
        </label>

        <label>
          Text
          <textarea class="voice-text" rows="4" placeholder="Write text for this voice to play."></textarea>
        </label>

        <label>
          Reference transcript
          <textarea class="reference-text" rows="3" placeholder="Exact words spoken in the WAV reference."></textarea>
        </label>

        <div class="slot-actions">
          <button class="primary-button play-button" type="button">Play text</button>
          <button class="secondary-button add-story-button" type="button">Add to story</button>
          <button class="secondary-button transcribe-button" type="button">Transcribe WAV</button>
          <button class="secondary-button sync-button" type="button">Sync Voicebox</button>
          <label class="upload-button">
            Upload WAV
            <input class="voice-file" type="file" accept=".wav,audio/wav,audio/x-wav">
          </label>
        </div>

        <audio class="reference-audio" controls preload="metadata"></audio>
        <p class="reference-meta">No reference clip yet.</p>
      </article>
    </template>

    <script src="app.js?v=voice-presets"></script>
  </body>
</html>
